}

.video-container iframe {

    left: 0;
    width: 100%;
    height: 85%;
}

.image-gallery {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    display: flex;
    flex-wrap: wrap;

    padding: 1rem;
    background-color: #f0f0f0; 
}

.image-gallery img {
    height: 30vh;
    width: auto;
    object-fit: cover;
}

@media (max-width: 768px) {
    .main-content {
        padding-bottom: 100vh; 
    }
    
    .image-gallery {
        position: static; 
        margin-top: 2rem;
