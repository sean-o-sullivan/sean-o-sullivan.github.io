<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Projects</title>
    <link rel="stylesheet" href="./styles.css">
    <!-- Masonry.js -->
    <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
    <!-- imagesLoaded.js -->
    <script src="https://unpkg.com/imagesloaded@4/imagesloaded.pkgd.min.js"></script>
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="nav-name">Seán O'Sullivan</div>
            <ul class="nav-links">
                <li><a href="index.html" class="active">My Projects</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="cv.html">CV</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </div>
    </nav>

    <section class="grid">
        <div class="grid-sizer"></div> <!-- Sizer element for Masonry -->
        <div class="grid-item">
            <img src="images/forceField/reflow.png" alt="ForceField">
            <h3>ForceField - An Impact Detecting Device for Hurling</h3>
        </div>
        <div class="grid-item">
            <img src="images/forceField/reflow.png" alt="Reflow Oven">
            <h3>DIY PID Controlled Reflow Oven</h3>
        </div>
        <div class="grid-item">
            <img src="images/clock.png" alt="feeder">
            <h3>RFID Cat Feeder</h3>
        </div>
        
        <div class="grid-item">
            <img src="images/clock.webp" alt="Clock">
            <h3>7 Segment Mechanical Clock Display</h3>
        </div>
        <div class="grid-item">
            <img src="images/spudnik.png" alt="Spudnik">
            <h3>Spudnik - Team Ireland CanSat European Finals 2023</h3>
        </div>
        <div class="grid-item">
            <img src="images/charger.png" alt="Charger">
            <h3>Bike Dynamo Rear Light & USB Charger</h3>
        </div>
        <!-- Add more grid items as needed -->
    </section>

    <script>
        var grid = document.querySelector('.grid');
        var msnry = new Masonry(grid, {
            itemSelector: '.grid-item',
            columnWidth: '.grid-sizer',
            gutter: 20, // Optional, for spacing between items
            percentPosition: true
        });

        imagesLoaded(grid, function() {
            msnry.layout();
        });
    </script>
</body>
</html>
