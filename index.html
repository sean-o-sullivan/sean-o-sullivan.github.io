<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home · Seán O'Sullivan</title>
    <link rel="stylesheet" href="../../static/styles.css">
    <style>
        @keyframes jump {
            0% { transform: translateY(0) scale(1) rotate(0deg); }
            15% { transform: translateY(1px) scale(0.98) rotate(0deg); }
            50% { transform: translateY(-6px) scale(1.05) rotate(5deg); }
            85% { transform: translateY(0) scale(1.02) rotate(0deg); }
            100% { transform: translateY(0) scale(1) rotate(0deg); }
        }

        .nav-links .random-link {
            color: #006400;
            font-weight: bold;
            font-size: 1.5rem;
            text-decoration: none !important;
            transition: transform 0.2s ease;
            display: inline-block;
            padding: 0.2rem;
            transform-origin: bottom center;
        }

        .random-link:hover {
            color: #008000;
            animation: jump 0.6s cubic-bezier(.2,-0.3,.7,1.3) forwards;
        }

        .textIcontainer iframe {
            border: none !important;
            outline: none !important;
            box-shadow: none !important;
        }
        
        .main-content {
            position: relative;
            padding-bottom: 0;
        }
        
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            margin-bottom: 0; 
        }
        
        .column {
            flex: 1;
            min-width: 300px;
        }
        
        .image-column {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .video-container {
            position: relative;
            width: 85%;
            padding-bottom: 56.25%; 
            height: 0;
            overflow: hidden;
            max-width: 800px; 
            margin: 0 auto;
        }
        
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 85%;
        }
        
        .image-gallery {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            padding: 1rem;
            background-color: #f0f0f0; 
        }
        
        .image-gallery img {
            height: 30vh;
            width: auto;
            object-fit: cover;
        }
        
        .fullscreen-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            cursor: pointer;
        }
        
        .fullscreen-image {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 90%;
            max-height: 90vh;
            object-fit: contain;
        }
        
        img {
            cursor: pointer;
        }
        
        @media (max-width: 768px) {
            .main-content {
                padding-bottom: 100vh; 
            }
            
            .image-gallery {
                position: static; 
                margin-top: 2rem;
            }
        }
    </style> 
</head>
<body class="loading-protection">
    <div id="fullscreen-overlay" class="fullscreen-overlay">
        <img id="fullscreen-image" class="fullscreen-image" src="" alt="">
    </div>

    <nav>
        <div class="nav-container">
            <div class="nav-name">Seán O'Sullivan</div>
            <ul class="nav-links">
                <li><a href="../../">Home</a></li>
                <li><a href="../../projects">My Projects</a></li>
                <li><a href="../../contact">Contact</a></li>
                <li><a href="../../about">About</a></li>
                <li><a href="https://en.wikipedia.org/wiki/Special:Random" 
                    id="randomLink" 
                    target="_blank" 
                    style="
                        color: #006400; 
                        font-size: 1.5rem; 
                        font-weight: 900;
                        text-decoration: none !important; 
                    ">?</a></li>
            </ul>
        </div>
    </nav>

    <div class="main-content">
        <div class="container">
            <div class="column text-column">
                <main>
                    <section>
                        <br>
                        <br>
                        <p>Hello!</p>
                        <p>This is my personal webpage, below is some content which I find useful.</p>
                        <br>
                    </section>
                </main>
            </div>
            <br>
            <section class="textIcontainer">
                <span style="display: inline-block; height: 30vh; width: calc(30vh * 16 / 9); max-width: 100%; vertical-align: top;">
                    <iframe 
                        src="https://www.youtube.com/embed/zuCcLAX5FuA" 
                        title="️‍🔥" 
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                        referrerpolicy="strict-origin-when-cross-origin" 
                        allowfullscreen
                        style="width: 100%; height: 100%; border: none; outline: none;"
                    ></iframe>
                </span>
                
                <img src="./static/home/inserts.jpg" alt="threaded inserts" style="height: 30vh; width: auto;" class="clickable-image">
                <img src="./static/home/figure_5a_large.png" alt="chooser chart a" style="height: 30vh; width: auto;" class="clickable-image">
                <img src="./static/home/figure_5b_large.png" alt="chooser chart b" style="height: 30vh; width: auto;" class="clickable-image">
                
                <img src="./static/home/Earth.jpg" alt="Planet Earth - Appolo 17" style="height: 30vh; width: auto;" class="clickable-image">
                <img src="./static/home/deep 3.jpg" alt="Farthest back look into time - James Webb" style="height: 30vh; width: auto;" class="clickable-image">
                <img src="./static/home/cool.jxl" alt="pretty cool" style="height: 30vh; width: auto;" class="clickable-image">
            </section> 
        </div>
    </div>

    <script>
        fetch('/navbar.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('navbar-container').innerHTML = data;
            });

        window.onload = function() {
            document.body.classList.add('loaded');
            
            // Set up random link functionality
            const randomLink = document.getElementById('randomLink');
            const wikiUrl = 'https://en.wikipedia.org/wiki/Special:Random';
            const wikiHowUrl = 'https://www.wikihow.com/special:randomizer';
            
            randomLink.addEventListener('click', function(e) {
                e.preventDefault();
                const randomChoice = Math.random() < 0.5 ? wikiUrl : wikiHowUrl;
                window.open(randomChoice, '_blank');
            });

            // Add hover animation
            randomLink.addEventListener('mouseenter', function() {
                this.style.animation = 'jump 0.6s cubic-bezier(.2,-0.3,.7,1.3) forwards';
                this.style.color = '#008000';
            });
            
            randomLink.addEventListener('mouseleave', function() {
                this.style.animation = '';
                this.style.color = '#006400';
            });
        };

        const overlay = document.getElementById('fullscreen-overlay');
        const fullscreenImg = document.getElementById('fullscreen-image');
        
        document.querySelectorAll('img:not(#fullscreen-image)').forEach(img => {
            img.addEventListener('click', function() {
                fullscreenImg.src = this.src;
                fullscreenImg.alt = this.alt;
                overlay.style.display = 'block';
                document.body.style.overflow = 'hidden';
            });
        });

        overlay.addEventListener('click', function() {
            overlay.style.display = 'none';
            document.body.style.overflow = '';
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && overlay.style.display === 'block') {
                overlay.style.display = 'none';
                document.body.style.overflow = '';
            }
        });
    </script>
</body>
</html>
