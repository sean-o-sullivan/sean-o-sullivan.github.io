<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery · Seán O'Sullivan</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div id="navbar-container"></div>
    <main class="home-content">

            <div class="gallery">
                <section class="image-gallery">
                    <img src="./rocks.jpg" 
                         alt="coastline" 
                         class="gallery-image clickable-image">
                    <img src="./bridge.jpg" 
                         alt="pretty cool obscured bridge" 
                         class="gallery-image clickable-image">
                    <img src="./sky.jpg" 
                         alt="woman and child with spectacular sky" 
                         class="gallery-image clickable-image">
                </section>
                <section class="image-gallery">
                    <img src="./Earth.jpg" 
                         alt="Planet Earth - Appolo 17" 
                         class="gallery-image clickable-image">
                    <img src="./deep 3.jpg" 
                         alt="Farthest back look into time - James Webb" 
                         class="gallery-image clickable-image">
                    <img src="./cool.jxl" 
                         alt="pretty cool" 
                         class="gallery-image clickable-image">
                </section>


        </div>
    </main>
    <!-- Fullscreen overlay for images -->
    <div id="fullscreen-overlay">
        <img id="fullscreen-image" src="" alt="">
    </div>
    <script src="/static/js/nav-loader.js"></script>
    <script src="/static/js/image-handler.js"></script>
</body>
</html>
