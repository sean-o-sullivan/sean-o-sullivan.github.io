<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VerifyMe · Seán O'Sullivan</title>
    <link rel="stylesheet" href="../../static/styles.css">
</head>
<body class="loading-protection">
    <nav>
        <div class="nav-container">
            <div class="nav-name">Seán O'Sullivan</div>
            <ul class="nav-links">
                <li><a href="../../projects">My Projects</a></li>
                <li><a href="../../contact">Contact</a></li>
                <li><a href="../../about">About</a></li>
            </ul>
        </div>
    </nav>
    
    <div class="main-content">
        <div class="container">
            <div class="column text-column">
                <header>
                    <h3>VerifyMe</h3>
                    <p class="subtitle"> - Learned Embedding Space Interactive Visualisation</p>
                </header>
                <main>
                    <section>
                        <p><b>Description</b></p>
                        <p>This graph contains 4,493, ≈10K character samples written by 995 authors from The Project Gutenberg Corpus.</p>
                    </section>
                    
                    <div id="plot-content">
                        <!-- The content of plot.html will be loaded here -->
                        <p id="loading-status">Loading plot...</p>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <script>
        // Add console logging for debugging
        console.log('Script started');
        
        // Function to check if we're running on a local file system
        function isLocalFile() {
            return window.location.protocol === 'file:';
        }

        // Load the plot content with better error handling and debugging
        async function loadPlot() {
            const loadingStatus = document.getElementById('loading-status');
            
            try {
                console.log('Attempting to fetch plot.html');
                const response = await fetch('plot.html');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                console.log('Successfully fetched plot.html');
                const data = await response.text();
                console.log('Plot data length:', data.length);
                
                if (data.trim().length === 0) {
                    loadingStatus.textContent = 'Error: Plot file is empty';
                    return;
                }

                const plotContent = document.getElementById('plot-content');
                plotContent.innerHTML = data;
                loadingStatus.remove();
                console.log('Plot content inserted into DOM');
            } catch (error) {
                console.error('Error loading plot:', error);
                if (isLocalFile()) {
                    loadingStatus.textContent = 'Error: Cannot load plot when running locally. Please use a web server.';
                } else {
                    loadingStatus.textContent = 'Error loading plot. Check console for details.';
                }
            }
        }

        // Call the load function when the document is ready
        document.addEventListener('DOMContentLoaded', loadPlot);

        // Add loaded class when everything is ready
        window.onload = function() {
            document.body.classList.remove('loading-protection');
            document.body.classList.add('loaded');
            console.log('Page fully loaded');
        };
    </script>
</body>
</html>
