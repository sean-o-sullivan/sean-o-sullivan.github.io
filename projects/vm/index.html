<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VerifyMe · Seán O'Sullivan</title>
    <link rel="stylesheet" href="../../static/styles.css">
</head>
<body class="loading-protection">
    <nav>
        <div class="nav-container">
            <div class="nav-name">Seán O'Sullivan</div>
            <ul class="nav-links">
                <li><a href="../../projects">My Projects</a></li>
                <li><a href="../../contact">Contact</a></li>
                <li><a href="../../about">About</a></li>
            </ul>
        </div>
    </nav>
    
    <div class="main-content">
        <div class="container">
            <div class="column text-column">
                <header>
                    <h3>VerifyMe</h3>
                    <p class="subtitle"> - Learned Embedding Space Interactive Visualisation</p>
                </header>
                <main>
                    <section>
                        <p><b>Description</b></p>
                        <p>This representece 4,493, ≈10K character samples written by 995 authors from The Project Gutenberg Corpus.</p>
                    </section>
                    
                    <div id="plot-content">
                        <!-- The content of plot.html will be loaded here -->
                    </div>
                </main>
            </div>
        </div>
    </div>

    <script>
        // Load the plot content
        fetch('plot.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('plot-content').innerHTML = data;
            })
            .catch(error => {
                console.error('Error loading plot:', error);
            });

        // Add loaded class when everything is ready
        window.onload = function() {
            document.body.classList.remove('loading-protection');
            document.body.classList.add('loaded');
        };
    </script>
</body>
</html>
